version: '3.9'

services:
  # ──────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: sentinel_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: Birla
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────
  # Redis (WebSocket token store + Celery broker)
  # ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sentinel_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ──────────────────────────────
  # Backend — FastAPI + SENTINEL AI Platform
  # ──────────────────────────────
  backend:
    build:
      context: ./abcl_ai_platform
      dockerfile: Dockerfile
    container_name: sentinel_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:12345678@db:5432/Birla
      REDIS_URL: redis://redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY:-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}
      GROQ_MODEL: llama3-70b-8192
      SECRET_KEY: abcl-sentinel-secret-key-2024
    ports:
      - "8000:8000"
    volumes:
      - ./abcl_ai_platform:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ──────────────────────────────
  # Frontend — React / Vite
  # ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinel_frontend
    restart: always
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
